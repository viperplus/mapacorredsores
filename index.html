<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa ESRN Rural - Río Negro</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/topojson-client@3.1.0/dist/topojson-client.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=League+Spartan:wght@400;700;900&family=Roboto+Condensed:wght@400;700&display=swap');

        :root {
            --azul-afa: #002d4a;
            --celeste-linea: #74acdf;
            --gris-fondo: #cbd5e1;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Roboto Condensed', sans-serif;
            background: var(--gris-fondo);
            display: flex;
            justify-content: center;
            padding: 20px;
            min-height: 100vh;
        }

        .main-wrapper {
            display: flex;
            gap: 20px;
            align-items: flex-start;
            justify-content: center;
            padding: 20px;
            flex-wrap: wrap;
            max-width: 1400px;
            width: 100%;
        }

        .map-container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            overflow: hidden;
            flex: 1;
            min-width: 0;
        }

        .map-header {
            background: var(--azul-afa);
            color: white;
            padding: 15px 25px;
            font-family: 'Oswald', sans-serif;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .map-header .subtitle {
            font-family: 'Roboto Condensed', sans-serif;
            font-size: 0.8rem;
            opacity: 0.8;
            font-weight: 400;
        }

        #map {
            width: 100%;
            height: 700px;
            background: #e8f4f8;
            position: relative;
            cursor: grab;
        }

        #map svg {
            width: 100%;
            height: 100%;
        }

        .province-path {
            fill: #f0f9ff;
            stroke: var(--azul-afa);
            stroke-width: 1.5;
            transition: fill 0.2s;
        }

        .dept-path {
            fill: none;
            stroke: #94a3b8;
            stroke-width: 0.5;
            stroke-opacity: 0.6;
        }

        .marker-group {
            cursor: pointer;
        }

        .marker-group:hover .marker-circle {
            r: 11;
            stroke-width: 3;
        }

        .marker-group:hover .marker-circle.sede-circle {
            r: 13;
            stroke-width: 3;
        }

        .marker-circle {
            stroke: white;
            stroke-width: 2;
            transition: stroke-width 0.15s;
        }

        .marker-pulse {
            fill: none;
            stroke-width: 1.5;
            opacity: 0;
        }

        .marker-label {
            font-family: 'Roboto Condensed', sans-serif;
            font-size: 9px;
            font-weight: 700;
            fill: var(--azul-afa);
            pointer-events: none;
            text-shadow: 0 0 4px white, 0 0 4px white, 0 0 4px white;
        }

        .corredor-ring {
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .corredor-ring:hover {
            opacity: 1 !important;
        }

        .corredor-hit {
            cursor: pointer;
        }

        .popup {
            position: absolute;
            background: white;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.2);
            padding: 0;
            min-width: 220px;
            max-width: 300px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s, transform 0.2s;
            transform: translateY(5px);
            z-index: 100;
            overflow: hidden;
        }

        .popup.visible {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        .popup-header {
            padding: 10px 15px;
            color: white;
            font-family: 'Oswald', sans-serif;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .popup-body {
            padding: 12px 15px;
        }

        .popup-row {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            font-size: 0.85rem;
            border-bottom: 1px solid #f1f5f9;
        }

        .popup-row:last-child {
            border-bottom: none;
        }

        .popup-label {
            font-weight: 700;
            color: var(--azul-afa);
        }

        .popup-value {
            color: #475569;
            text-align: right;
        }

        .popup-close {
            margin-left: auto;
            background: none;
            border: none;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            pointer-events: auto;
            opacity: 0.8;
        }

        .popup-close:hover { opacity: 1; }

        /* Corredor panel */
        .corredor-panel {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 320px;
            max-height: calc(100% - 60px);
            background: white;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.2);
            z-index: 110;
            overflow: hidden;
            opacity: 0;
            transform: translateY(5px);
            transition: opacity 0.2s, transform 0.2s;
            pointer-events: none;
            display: flex;
            flex-direction: column;
        }

        .corredor-panel.visible {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        .corredor-panel-header {
            padding: 12px 16px;
            background: var(--azul-afa);
            color: white;
            font-family: 'Oswald', sans-serif;
            font-size: 1.05rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .corredor-panel-header .corredor-color {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            flex-shrink: 0;
            border: 2px solid rgba(255,255,255,0.5);
        }

        .corredor-panel-close {
            margin-left: auto;
            background: none;
            border: none;
            color: white;
            font-size: 1.1rem;
            cursor: pointer;
            opacity: 0.8;
        }

        .corredor-panel-close:hover { opacity: 1; }

        .corredor-panel-body {
            padding: 12px 16px;
            overflow-y: auto;
            flex: 1;
        }

        .corredor-panel-section {
            margin-bottom: 12px;
        }

        .corredor-panel-section label {
            display: block;
            font-weight: 700;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--azul-afa);
            margin-bottom: 4px;
        }

        .corredor-panel-section .value {
            font-size: 0.85rem;
            color: #475569;
            line-height: 1.4;
        }

        .corredor-panel-info {
            font-size: 0.85rem;
            color: #475569;
            line-height: 1.5;
            min-height: 60px;
            padding: 8px 10px;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            background: #f8fafc;
            outline: none;
            transition: border-color 0.15s, background 0.15s;
        }

        .corredor-panel-info:focus {
            border-color: var(--celeste-linea);
            background: white;
        }

        .corredor-panel-info[contenteditable="true"] {
            border-color: var(--celeste-linea);
            background: white;
        }

        .corredor-panel-actions {
            display: flex;
            gap: 8px;
            padding: 8px 16px 12px;
        }

        .corredor-panel-actions button {
            padding: 6px 14px;
            border: none;
            border-radius: 6px;
            font-family: 'Roboto Condensed', sans-serif;
            font-size: 0.8rem;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.15s;
        }

        .btn-edit {
            background: var(--celeste-linea);
            color: white;
        }

        .btn-edit:hover { background: #5a9bd0; }

        .btn-save {
            background: #22c55e;
            color: white;
        }

        .btn-save:hover { background: #16a34a; }

        .btn-cancel {
            background: #e2e8f0;
            color: #475569;
        }

        .btn-cancel:hover { background: #cbd5e1; }

        /* Sidebar */
        .sidebar {
            width: 320px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            overflow: hidden;
            flex-shrink: 0;
        }

        .sidebar-header {
            background: var(--azul-afa);
            color: white;
            padding: 15px 20px;
            font-family: 'Oswald', sans-serif;
            font-size: 1.1rem;
        }

        .sidebar-search {
            padding: 12px 15px;
            border-bottom: 1px solid #e2e8f0;
        }

        .sidebar-search input {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-family: 'Roboto Condensed', sans-serif;
            font-size: 0.85rem;
        }

        .sidebar-list {
            max-height: 540px;
            overflow-y: auto;
            padding: 5px 0;
        }

        .sidebar-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 7px 15px;
            cursor: pointer;
            transition: background 0.15s;
            border-left: 3px solid transparent;
        }

        .sidebar-item:hover {
            background: #f8fafc;
            border-left-color: var(--celeste-linea);
        }

        .sidebar-item.active {
            background: #f1f5f9;
            border-left-color: var(--azul-afa);
        }

        .sidebar-item .dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            flex-shrink: 0;
            border: 2px solid white;
            box-shadow: 0 0 0 1px rgba(0,0,0,0.1);
        }

        .sidebar-item .info {
            flex: 1;
            min-width: 0;
        }

        .sidebar-item .name {
            font-weight: 700;
            font-size: 0.85rem;
            color: var(--azul-afa);
        }

        .sidebar-item .loc {
            font-size: 0.75rem;
            color: #64748b;
        }

        .sidebar-item .num {
            font-family: 'Oswald', sans-serif;
            font-size: 0.8rem;
            color: #94a3b8;
            min-width: 24px;
        }

        .map-controls {
            position: absolute;
            bottom: 15px;
            right: 15px;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 5px;
            z-index: 50;
        }

        .map-controls button {
            width: 36px;
            height: 36px;
            border: none;
            border-radius: 8px;
            background: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            cursor: pointer;
            font-size: 1.1rem;
            color: var(--azul-afa);
            transition: 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .map-controls button:hover {
            background: var(--celeste-linea);
            color: white;
        }

        .map-controls button.active {
            background: var(--azul-afa);
            color: white;
        }

        .btn-toggle-corredores {
            width: auto !important;
            padding: 0 14px !important;
            gap: 6px;
            font-size: 0.8rem !important;
            font-family: 'Roboto Condensed', sans-serif;
            font-weight: 700;
            letter-spacing: 0.3px;
            border-radius: 18px !important;
            margin-bottom: 4px;
        }

        .btn-toggle-corredores .icon {
            font-size: 1rem;
            line-height: 1;
        }

        .btn-toggle-corredores .label {
            white-space: nowrap;
        }

        .btn-toggle-corredores.active {
            background: #166534 !important;
        }

        .btn-toggle-corredores.active .icon {
            opacity: 1;
        }

        .btn-toggle-corredores.inactive {
            background: #94a3b8 !important;
            color: white !important;
        }

        .btn-toggle-corredores.inactive .icon {
            opacity: 0.6;
        }

        .tooltip {
            position: absolute;
            padding: 4px 10px;
            background: rgba(0,45,74,0.9);
            color: white;
            border-radius: 6px;
            font-family: 'Roboto Condensed', sans-serif;
            font-size: 0.8rem;
            pointer-events: none;
            z-index: 90;
            opacity: 0;
            transition: opacity 0.15s;
            white-space: nowrap;
        }

        .tooltip.visible {
            opacity: 1;
        }

        .loading-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.8);
            z-index: 200;
            font-family: 'Roboto Condensed', sans-serif;
            font-size: 1rem;
            color: var(--azul-afa);
            gap: 10px;
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 3px solid #e2e8f0;
            border-top-color: var(--azul-afa);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .stats-bar {
            display: flex;
            gap: 20px;
            padding: 10px 20px;
            background: #f8fafc;
            border-top: 1px solid #e2e8f0;
            font-size: 0.8rem;
            color: #64748b;
        }

        .stats-bar strong {
            color: var(--azul-afa);
        }

        @media (max-width: 900px) {
            .sidebar { width: 100%; max-height: 300px; }
            .sidebar-list { max-height: 200px; }
            #map { height: 500px; }
            .corredor-panel { width: 260px; right: 5px; top: 5px; }
        }
    </style>
</head>
<body>
    <div class="main-wrapper">
        <div class="map-container">
            <div class="map-header">
                <span>Mapa de corredores</span>
                <span class="subtitle">Provincia de Río Negro</span>
            </div>
            <div id="map">
                <div class="loading-overlay" id="loading">
                    <div class="spinner"></div>
                    Cargando mapa...
                </div>
                <div class="popup" id="popup">
                    <div class="popup-header" id="popupHeader">
                        <span id="popupTitle"></span>
                        <button class="popup-close" id="popupClose">✕</button>
                    </div>
                    <div class="popup-body" id="popupBody"></div>
                </div>
                <div class="corredor-panel" id="corredorPanel">
                    <div class="corredor-panel-header">
                        <span class="corredor-color" id="corredorPanelColor"></span>
                        <span id="corredorPanelTitle">Corredor</span>
                        <button class="corredor-panel-close" id="corredorPanelClose">✕</button>
                    </div>
                    <div class="corredor-panel-body">
                        <div class="corredor-panel-section">
                            <label>Anexos</label>
                            <div class="value" id="corredorPanelAnexos"></div>
                        </div>
                        <div class="corredor-panel-section">
                            <label>Patrimonio Geográfico</label>
                            <div class="corredor-panel-info" id="cp-patrimonio" contenteditable="false"></div>
                        </div>
                        <div class="corredor-panel-section">
                            <label>Fiestas</label>
                            <div class="corredor-panel-info" id="cp-fiestas" contenteditable="false"></div>
                        </div>
                        <div class="corredor-panel-section">
                            <label>Aspectos Identitarios</label>
                            <div class="corredor-panel-info" id="cp-identidad" contenteditable="false"></div>
                        </div>
                    </div>
                    <div class="corredor-panel-actions">
                        <button class="btn-edit" id="corredorPanelEditBtn">✏️ Editar</button>
                        <button class="btn-save" id="corredorPanelSaveBtn" style="display:none">💾 Guardar</button>
                        <button class="btn-cancel" id="corredorPanelCancelBtn" style="display:none">Cancelar</button>
                    </div>
                </div>
                <div class="tooltip" id="tooltip"></div>
                <div class="map-controls">
                    <button id="toggleRutas" class="btn-toggle-corredores inactive" title="Mostrar rutas nacionales">
                        <span class="icon">🛣</span>
                        <span class="label">Rutas</span>
                    </button>
                    <button id="toggleCorredores" class="btn-toggle-corredores active" title="Ocultar corredores">
                        <span class="icon">👁</span>
                        <span class="label">Corredores</span>
                    </button>
                    <button id="zoomIn" title="Acercar">＋</button>
                    <button id="zoomOut" title="Alejar">−</button>
                    <button id="zoomReset" title="Restablecer vista">⟲</button>
                </div>
            </div>
            <div class="stats-bar">
                <span><strong id="totalAnexos">0</strong> Anexos</span>
                <span><strong id="totalCorredores">0</strong> Corredores</span>
                <span>Click en un marcador o corredor para ver detalles</span>
                <span style="margin-left:auto;opacity:0.6;font-size:0.75rem">Fuente: Wikiparajes</span>
            </div>
        </div>

        <div class="sidebar">
            <div class="sidebar-header">Anexos</div>
            <div class="sidebar-search">
                <input type="text" id="searchInput" placeholder="Buscar anexo o localidad..." oninput="filterList()">
            </div>
            <div class="sidebar-list" id="sidebarList"></div>
        </div>
    </div>

        // --- Corredor panel ---
        function showCorredorPanel(c) {
            hidePopup();
            const panel = document.getElementById('corredorPanel');
            document.getElementById('corredorPanelColor').style.background = c.color;
            document.getElementById('corredorPanelTitle').textContent = c.nombre;

            const nombres = c.anexosNums.map(num => {
                const a = ANEXOS.find(x => x.num === num);
                return a ? a.nombre : null;
            }).filter(Boolean).join(', ');
            document.getElementById('corredorPanelAnexos').textContent = nombres;

            const saved = loadCorredorInfo(c.id);
            const p = saved && saved.patrimonio != null ? saved.patrimonio : c.patrimonio || '';
            const f = saved && saved.fiestas != null ? saved.fiestas : c.fiestas || '';
            const idv = saved && saved.identidad != null ? saved.identidad : c.identidad || '';

            ['cp-patrimonio', 'cp-fiestas', 'cp-identidad'].forEach(sid => {
                const el = document.getElementById(sid);
                el.dataset.corredorId = c.id;
                el.contentEditable = false;
                el.style.borderColor = '#e2e8f0';
                el.style.background = '#f8fafc';
            });
            document.getElementById('cp-patrimonio').innerHTML = p;
            document.getElementById('cp-fiestas').innerHTML = f;
            document.getElementById('cp-identidad').innerHTML = idv;

            document.getElementById('corredorPanelEditBtn').style.display = '';
            document.getElementById('corredorPanelSaveBtn').style.display = 'none';
            document.getElementById('corredorPanelCancelBtn').style.display = 'none';

            panel.classList.add('visible');
        }

        function hideCorredorPanel() {
            document.getElementById('corredorPanel').classList.remove('visible');
        }

        function loadCorredorInfo(id) {
            try {
                const all = JSON.parse(localStorage.getItem('esrn_corredores_info') || '{}');
                return all[String(id)] || {};
            } catch(e) { return {}; }
        }

        function saveCorredorInfo(id, data) {
            try {
                const all = JSON.parse(localStorage.getItem('esrn_corredores_info') || '{}');
                all[String(id)] = data;
                localStorage.setItem('esrn_corredores_info', JSON.stringify(all));
            } catch(e) {}
        }

        document.getElementById('corredorPanelClose').addEventListener('click', hideCorredorPanel);

        document.getElementById('corredorPanelEditBtn').addEventListener('click', () => {
            ['cp-patrimonio', 'cp-fiestas', 'cp-identidad'].forEach(sid => {
                const el = document.getElementById(sid);
                el.contentEditable = true;
                el.style.borderColor = 'var(--celeste-linea)';
                el.style.background = 'white';
            });
            document.getElementById('cp-patrimonio').focus();
            document.getElementById('corredorPanelEditBtn').style.display = 'none';
            document.getElementById('corredorPanelSaveBtn').style.display = '';
            document.getElementById('corredorPanelCancelBtn').style.display = '';
        });

        document.getElementById('corredorPanelSaveBtn').addEventListener('click', () => {
            const id = document.getElementById('cp-patrimonio').dataset.corredorId;
            const data = {
                patrimonio: document.getElementById('cp-patrimonio').innerHTML,
                fiestas: document.getElementById('cp-fiestas').innerHTML,
                identidad: document.getElementById('cp-identidad').innerHTML
            };
            saveCorredorInfo(id, data);
            ['cp-patrimonio', 'cp-fiestas', 'cp-identidad'].forEach(sid => {
                const el = document.getElementById(sid);
                el.contentEditable = false;
                el.style.borderColor = '#e2e8f0';
                el.style.background = '#f8fafc';
            });
            document.getElementById('corredorPanelEditBtn').style.display = '';
            document.getElementById('corredorPanelSaveBtn').style.display = 'none';
            document.getElementById('corredorPanelCancelBtn').style.display = 'none';
        });

        document.getElementById('corredorPanelCancelBtn').addEventListener('click', () => {
            const id = document.getElementById('cp-patrimonio').dataset.corredorId;
            const c = CORREDORES.find(x => x.id === parseInt(id));
            const saved = loadCorredorInfo(id);
            if (c) {
                document.getElementById('cp-patrimonio').innerHTML = (saved.patrimonio != null ? saved.patrimonio : c.patrimonio) || '';
                document.getElementById('cp-fiestas').innerHTML = (saved.fiestas != null ? saved.fiestas : c.fiestas) || '';
                document.getElementById('cp-identidad').innerHTML = (saved.identidad != null ? saved.identidad : c.identidad) || '';
            }
            ['cp-patrimonio', 'cp-fiestas', 'cp-identidad'].forEach(sid => {
                const el = document.getElementById(sid);
                el.contentEditable = false;
                el.style.borderColor = '#e2e8f0';
                el.style.background = '#f8fafc';
            });
            document.getElementById('corredorPanelEditBtn').style.display = '';
            document.getElementById('corredorPanelSaveBtn').style.display = 'none';
            document.getElementById('corredorPanelCancelBtn').style.display = 'none';
        });

        // --- Popup functions ---
        function buildPopupContent(a) {
            const hdr = document.getElementById('popupHeader');
            const title = document.getElementById('popupTitle');
            const body = document.getElementById('popupBody');
            hdr.style.background = a.color;
            title.textContent = a.sede ? '🏢 Sede Central' : `Anexo N° ${a.num}`;
            let html = `
                <div class="popup-row"><span class="popup-label">Localidad</span><span class="popup-value">${a.nombre}</span></div>
                <div class="popup-row"><span class="popup-label">Departamento</span><span class="popup-value">${a.depto}</span></div>
            `;
            if (!a.sede) {
                html += `<div class="popup-row"><span class="popup-label">Anexo N°</span><span class="popup-value">${a.num}</span></div>`;
            }
            const dist = distViedma(a);
            html += `<div class="popup-row"><span class="popup-label">Dist. a Viedma</span><span class="popup-value">~${dist} km</span></div>`;
            html += `<div style="margin-top:8px;display:flex;gap:6px;align-items:center;font-size:0.8rem">
                <span style="display:inline-block;width:12px;height:12px;border-radius:50%;background:${a.color};border:2px solid white;box-shadow:0 0 0 1px rgba(0,0,0,0.1)"></span>
                <span style="color:#64748b">Color distintivo</span>
            </div>`;
            body.innerHTML = html;
        }

        function distViedma(a) {
            const dlat = a.lat - (-40.81345);
            const dlon = a.lon - (-62.99668);
            const km = Math.round(Math.sqrt(dlat*dlat + dlon*dlon) * 111.32);
            return km;
        }

        function showPopup(a, x, y) {
            activeAnexo = a;
            buildPopupContent(a);
            popup.classList.add('visible');
            const rect = mapDiv.getBoundingClientRect();
            let px = (x != null) ? x : rect.width / 2 - 110;
            let py = (y != null) ? y - 10 : rect.height / 2 - 60;
            if (px + 220 > rect.width) px = rect.width - 230;
            if (px < 10) px = 10;
            if (py < 10) py = (y != null ? y : rect.height / 2) + 20;
            popup.style.left = px + 'px';
            popup.style.top = py + 'px';
            highlightSidebar(a);
        }

        function hidePopup() {
            popup.classList.remove('visible');
            activeAnexo = null;
            clearSidebarHighlight();
        }

        document.getElementById('popupClose').addEventListener('click', hidePopup);

        function showTooltip(text, x, y) {
            tooltip.textContent = text;
            tooltip.classList.add('visible');
            tooltip.style.left = (x + 12) + 'px';
            tooltip.style.top = (y - 10) + 'px';
        }

        function hideTooltip() {
            tooltip.classList.remove('visible');
        }

        function projectPoint(lon, lat) {
            return projectionFn ? projectionFn([lon, lat]) : null;
        }

        // --- Corredores drawing ---
        function drawCorredores() {
            gCorredores.selectAll('*').remove();
            if (!projectionFn) return;

            CORREDORES.forEach(c => {
                const anexos = c.anexosNums.map(num => ANEXOS.find(a => a.num === num)).filter(Boolean);
                if (anexos.length === 0) return;

                if (anexos.length === 1) {
                    const a = anexos[0];
                    const p = projectionFn([a.lon, a.lat]);
                    if (!p) return;
                    // Fill glow
                    gCorredores.append('circle')
                        .attr('cx', p[0]).attr('cy', p[1])
                        .attr('r', 20)
                        .attr('fill', c.color)
                        .attr('opacity', 0.12)
                        .attr('class', 'corredor-glow')
                        .attr('data-corredor', c.id);
                    // Ring
                    gCorredores.append('circle')
                        .attr('cx', p[0]).attr('cy', p[1])
                        .attr('r', 18)
                        .attr('fill', 'none')
                        .attr('stroke', c.color)
                        .attr('stroke-width', 3)
                        .attr('stroke-dasharray', '5,4')
                        .attr('opacity', 0.7)
                        .attr('class', 'corredor-ring')
                        .attr('data-corredor', c.id)
                        .style('cursor', 'pointer')
                        .on('click', (event) => { event.stopPropagation(); showCorredorPanel(c); })
                        .on('mouseenter', function() {
                            d3.select(this).attr('opacity', 1).attr('stroke-width', 4.5);
                            d3.select(this.parentNode).select('.corredor-glow[data-corredor="' + c.id + '"]').attr('opacity', 0.2);
                        })
                        .on('mouseleave', function() {
                            d3.select(this).attr('opacity', 0.7).attr('stroke-width', 3);
                            d3.select(this.parentNode).select('.corredor-glow[data-corredor="' + c.id + '"]').attr('opacity', 0.12);
                        });
                    return;
                }

                const sorted = [...anexos].sort((a, b) => b.lat - a.lat);
                const points = sorted.map(a => projectionFn([a.lon, a.lat])).filter(Boolean);
                if (points.length < 2) return;

                const lineGen = d3.line().x(d => d[0]).y(d => d[1]).curve(d3.curveCatmullRom);

                // Invisible hit area (wide for easy clicking)
                gCorredores.append('path')
                    .attr('d', lineGen(points))
                    .attr('fill', 'none')
                    .attr('stroke', 'transparent')
                    .attr('stroke-width', 28)
                    .attr('class', 'corredor-hit')
                    .attr('data-corredor', c.id)
                    .style('cursor', 'pointer')
                    .attr('stroke-linecap', 'round')
                    .attr('stroke-linejoin', 'round')
                    .on('click', (event) => { event.stopPropagation(); showCorredorPanel(c); })
                    .on('mouseenter', function() {
                        const pid = c.id;
                        d3.select(this.parentNode).select('.corredor-band[data-corredor="'+pid+'"]').attr('opacity', 0.35);
                        d3.select(this.parentNode).select('.corredor-outline[data-corredor="'+pid+'"]').attr('opacity', 0.9).attr('stroke-width', 3);
                    })
                    .on('mouseleave', function() {
                        const pid = c.id;
                        d3.select(this.parentNode).select('.corredor-band[data-corredor="'+pid+'"]').attr('opacity', 0.2);
                        d3.select(this.parentNode).select('.corredor-outline[data-corredor="'+pid+'"]').attr('opacity', 0.55).attr('stroke-width', 1.5);
                    });

                // Thick semi-transparent band
                gCorredores.append('path')
                    .attr('d', lineGen(points))
                    .attr('fill', 'none')
                    .attr('stroke', c.color)
                    .attr('stroke-width', 14)
                    .attr('opacity', 0.2)
                    .attr('class', 'corredor-band')
                    .attr('data-corredor', c.id)
                    .style('pointer-events', 'none')
                    .attr('stroke-linecap', 'round')
                    .attr('stroke-linejoin', 'round');

                // Thin border outline
                gCorredores.append('path')
                    .attr('d', lineGen(points))
                    .attr('fill', 'none')
                    .attr('stroke', c.color)
                    .attr('stroke-width', 1.5)
                    .attr('opacity', 0.55)
                    .attr('class', 'corredor-outline')
                    .attr('data-corredor', c.id)
                    .style('pointer-events', 'none')
                    .attr('stroke-linecap', 'round')
                    .attr('stroke-linejoin', 'round');
            });

            gCorredores.style('display', corredoresVisible ? null : 'none');
        }

        function toggleCorredores() {
            corredoresVisible = !corredoresVisible;
            gCorredores.style('display', corredoresVisible ? null : 'none');
            const btn = document.getElementById('toggleCorredores');
            btn.classList.toggle('active', corredoresVisible);
            btn.classList.toggle('inactive', !corredoresVisible);
            btn.querySelector('.label').textContent = corredoresVisible ? 'Corredores' : 'Ocultos';
            btn.title = corredoresVisible ? 'Ocultar corredores' : 'Mostrar corredores';
        }

        function toggleRutas() {
            rutasVisible = !rutasVisible;
            gRutas.style('display', rutasVisible ? null : 'none');
            const btn = document.getElementById('toggleRutas');
            btn.classList.toggle('active', rutasVisible);
            btn.classList.toggle('inactive', !rutasVisible);
            btn.querySelector('.label').textContent = rutasVisible ? 'Rutas' : 'Rutas';
            btn.title = rutasVisible ? 'Ocultar rutas' : 'Mostrar rutas';
        }

        // --- Map rendering ---
        function renderMap() {
            d3.json(TOPOJSON_URL).then(topo => {
                const geojson = topojson.feature(topo, topo.objects['departamentos-argentina']);
                const rnFeatures = geojson.features.filter(d => d.properties.provincia === 'RIO NEGRO');

                projectionFn = d3.geoMercator()
                    .center([-67.4, -39.8])
                    .fitSize([W * 0.88, H * 0.88], { type: 'FeatureCollection', features: rnFeatures });
                pathFn = d3.geoPath().projection(projectionFn);

                const deptsPath = gDepts.selectAll('path')
                    .data(rnFeatures)
                    .join('path')
                    .attr('class', 'dept-path')
                    .attr('d', pathFn);

                gProvince.append('path')
                    .attr('class', 'province-path')
                    .attr('d', pathFn({ type: 'FeatureCollection', features: rnFeatures }));

                const lineGen = d3.line().x(d => d[0]).y(d => d[1]);
                RUTAS.forEach(r => {
                    r.segmentos.forEach(seg => {
                        const pts = seg.map(p => projectionFn(p)).filter(Boolean);
                        if (pts.length < 2) return;
                        gRutas.append('path')
                            .attr('d', lineGen(pts))
                            .attr('fill', 'none')
                            .attr('stroke', r.color)
                            .attr('stroke-width', 2)
                            .attr('opacity', 0.55)
                            .attr('stroke-linecap', 'round')
                            .attr('stroke-linejoin', 'round')
                            .attr('class', 'ruta-path');
                    });
                    // Label on longest segment
                    let bestPts = null;
                    r.segmentos.forEach(seg => {
                        const pts = seg.map(p => projectionFn(p)).filter(Boolean);
                        if (pts.length > (bestPts ? bestPts.length : 0)) bestPts = pts;
                    });
                    if (bestPts && bestPts.length >= 2) {
                        const mid = Math.floor(bestPts.length / 2);
                        gRutas.append('text')
                            .attr('x', bestPts[mid][0])
                            .attr('y', bestPts[mid][1] - 6)
                            .attr('text-anchor', 'middle')
                            .attr('fill', r.color)
                            .attr('font-size', '10px')
                            .attr('font-weight', '700')
                            .attr('font-family', 'Roboto Condensed, sans-serif')
                            .attr('opacity', 0.7)
                            .attr('class', 'ruta-label')
                            .text(r.nombre);
                    }
                });
                gRutas.style('display', 'none');

                ANEXOS.forEach(a => {
                    const p = projectionFn([a.lon, a.lat]);
                    if (!p) return;

                    const g = gMarkers.append('g')
                        .attr('class', 'marker-group')
                        .attr('transform', `translate(${p[0]},${p[1]})`);

                    g.append('circle')
                        .attr('class', 'marker-circle' + (a.sede ? ' sede-circle' : ''))
                        .attr('r', a.sede ? 10 : 8)
                        .attr('fill', a.color);

                    g.append('circle')
                        .attr('class', 'marker-pulse')
                        .attr('r', a.sede ? 14 : 11)
                        .attr('stroke', a.color);

                    g.append('text')
                        .attr('class', 'marker-label')
                        .attr('dy', a.sede ? -16 : -14)
                        .attr('text-anchor', 'middle')
                        .text(a.nombre);

                    g.on('mouseenter', (event) => {
                        const rect = mapDiv.getBoundingClientRect();
                        showTooltip(`Anexo ${a.num ? a.num + ' - ' : ''}${a.nombre}`, event.clientX - rect.left, event.clientY - rect.top);
                    });
                    g.on('mousemove', (event) => {
                        const rect = mapDiv.getBoundingClientRect();
                        showTooltip(`Anexo ${a.num ? a.num + ' - ' : ''}${a.nombre}`, event.clientX - rect.left, event.clientY - rect.top);
                    });
                    g.on('mouseleave', hideTooltip);
                    g.on('click', (event) => {
                        event.stopPropagation();
                        const rect = mapDiv.getBoundingClientRect();
                        showPopup(a, event.clientX - rect.left, event.clientY - rect.top);
                    });
                });

                drawCorredores();
                document.getElementById('toggleCorredores').classList.add('active');

                svg.on('click', () => { hidePopup(); hideCorredorPanel(); });
                loading.style.display = 'none';
                document.getElementById('totalAnexos').textContent = ANEXOS.length - 1;
                document.getElementById('totalCorredores').textContent = CORREDORES.length;
                buildSidebar();

            }).catch(err => {
                loading.innerHTML = '❌ Error al cargar el mapa. <br><small>' + err.message + '</small>';
                console.error(err);
            });
        }

        // --- Sidebar ---
        function buildSidebar() {
            const list = document.getElementById('sidebarList');
            list.innerHTML = '';
            ANEXOS.forEach(a => {
                const div = document.createElement('div');
                div.className = 'sidebar-item';
                div.dataset.num = a.num;
                div.innerHTML = `
                    <span class="num">${a.sede ? '★' : 'N°'+a.num}</span>
                    <span class="dot" style="background:${a.color}"></span>
                    <div class="info">
                        <div class="name">${a.nombre}</div>
                        <div class="loc">${a.depto} ${a.sede ? '· Sede Central' : ''}</div>
                    </div>
                `;
                div.addEventListener('click', () => {
                    const p = projectPoint(a.lon, a.lat);
                    if (!p) return;
                    const targetZoom = 1.5;
                    const tx = W/2 - p[0] * targetZoom;
                    const ty = H/2 - p[1] * targetZoom;
                    zoomOffset = [tx, ty];
                    currentZoom = targetZoom;
                    gMain.transition().duration(500).attr('transform', `translate(${tx},${ty}) scale(${targetZoom})`);
                    showPopup(a, null, null);
                });
                list.appendChild(div);
            });
        }

        function filterList() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            const items = document.querySelectorAll('.sidebar-item');
            items.forEach(el => {
                const text = el.textContent.toLowerCase();
                el.style.display = text.includes(q) ? 'flex' : 'none';
            });
        }

        function highlightSidebar(a) {
            document.querySelectorAll('.sidebar-item').forEach(el => {
                const num = parseInt(el.dataset.num);
                if (num === a.num && !a.sede || (a.sede && el.dataset.num === '0')) {
                    el.classList.add('active');
                } else {
                    el.classList.remove('active');
                }
            });
        }

        function clearSidebarHighlight() {
            document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
        }

        // --- Zoom / Pan ---
        function zoomToCenter(factor) {
            const rect = mapDiv.getBoundingClientRect();
            const cx = rect.width / 2, cy = rect.height / 2;
            const newZoom = Math.max(0.5, Math.min(8, currentZoom * factor));
            const scale = newZoom / currentZoom;
            zoomOffset = [cx - (cx - zoomOffset[0]) * scale, cy - (cy - zoomOffset[1]) * scale];
            currentZoom = newZoom;
            gMain.transition().duration(300).attr('transform', `translate(${zoomOffset[0]},${zoomOffset[1]}) scale(${currentZoom})`);
        }

        document.getElementById('toggleCorredores').addEventListener('click', toggleCorredores);
        document.getElementById('toggleRutas').addEventListener('click', toggleRutas);
        document.getElementById('zoomIn').addEventListener('click', () => zoomToCenter(1.4));
        document.getElementById('zoomOut').addEventListener('click', () => zoomToCenter(1 / 1.4));

        document.getElementById('zoomReset').addEventListener('click', () => {
            currentZoom = 1;
            zoomOffset = [0, 0];
            gMain.transition().duration(400).attr('transform', 'translate(0,0) scale(1)');
            hidePopup();
            hideCorredorPanel();
        });

        svg.on('mousedown', (event) => {
            if (event.target.closest('.marker-group')) return;
            if (event.target.closest('.corredor-hit')) return;
            if (event.target.closest('.corredor-ring')) return;
            isPanning = true;
            panStart = [event.clientX - zoomOffset[0], event.clientY - zoomOffset[1]];
            svg.style('cursor', 'grabbing');
        });

        d3.select(window).on('mousemove', (event) => {
            if (!isPanning) return;
            zoomOffset = [event.clientX - panStart[0], event.clientY - panStart[1]];
            gMain.attr('transform', `translate(${zoomOffset[0]},${zoomOffset[1]}) scale(${currentZoom})`);
        });

        d3.select(window).on('mouseup', () => {
            isPanning = false;
            svg.style('cursor', 'grab');
        });

        svg.on('wheel', (event) => {
            event.preventDefault();
            const rect = mapDiv.getBoundingClientRect();
            const mx = event.clientX - rect.left;
            const my = event.clientY - rect.top;
            const delta = event.deltaY > 0 ? 0.85 : 1.18;
            const newZoom = Math.max(0.5, Math.min(8, currentZoom * delta));
            const scale = newZoom / currentZoom;
            const tx = mx - (mx - zoomOffset[0]) * scale;
            const ty = my - (my - zoomOffset[1]) * scale;
            zoomOffset = [tx, ty];
            currentZoom = newZoom;
            gMain.transition().duration(150).attr('transform', `translate(${zoomOffset[0]},${zoomOffset[1]}) scale(${currentZoom})`);
        }, { passive: false });

        renderMap();
    </script>
</body>
</html>
